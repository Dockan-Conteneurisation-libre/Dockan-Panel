name: dockan-panel
services:
  web:
    build: .
    image: dockan-panel:latest
    ports:
      - 9090:9090
    env:
      - DOCKAN_UI_TOKEN=dockan
      - DOCKAN_BIN=dockan
    volumes:
      - dockan-panel-data:/app/storage
    isolation: none
    restart: always
    healthcheck: CMD-SHELL curl -fsS http://127.0.0.1:9090/ >/dev/null
